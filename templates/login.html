<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruthMesh - Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            bg: '#0B0F19',
                            card: '#111827',
                            border: '#1F2937'
                        },
                        brand: {
                            blue: '#3B82F6',
                            purple: '#8B5CF6'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark-bg text-gray-300 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md bg-dark-card border border-dark-border rounded-xl p-8 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-brand-blue to-brand-purple tracking-tight mb-2">TruthMesh</h1>
            <p class="text-sm text-gray-400">Secure Medical & Financial Intelligence</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div id="error-msg" class="hidden bg-red-900/50 border border-red-500/50 text-red-200 p-3 rounded-lg text-sm text-center">
                Invalid credentials or access denied.
            </div>

            <div>
                <label for="username" class="block text-sm font-medium text-gray-400 mb-2">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-user text-gray-500"></i>
                    </div>
                    <input type="text" id="username" name="username" required
                        class="w-full pl-10 bg-dark-bg border border-dark-border rounded-lg py-3 px-4 text-white focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition-colors">
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-400 mb-2">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-gray-500"></i>
                    </div>
                    <input type="password" id="password" name="password" required
                        class="w-full pl-10 bg-dark-bg border border-dark-border rounded-lg py-3 px-4 text-white focus:outline-none focus:border-brand-purple focus:ring-1 focus:ring-brand-purple transition-colors">
                </div>
            </div>

            <button type="submit"
                class="w-full bg-gradient-to-r from-brand-blue to-brand-purple text-white font-semibold py-3 px-4 rounded-lg hover:opacity-90 transition-opacity focus:outline-none focus:ring-2 focus:ring-brand-blue focus:ring-offset-2 focus:ring-offset-dark-card flex items-center justify-center space-x-2">
                <span>Authenticate</span>
                <i class="fas fa-arrow-right text-sm"></i>
            </button>
        </form>

        <div class="mt-8 text-center text-xs text-gray-500">
            <p>Protected by TruthMesh Identity Core.</p>
            <p class="mt-1">Demo access: <span class="font-mono text-gray-400">admin / truthmesh123</span> or <span class="font-mono text-gray-400">demo / demo123</span></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';
            btn.disabled = true;
            
            const formData = new URLSearchParams(new FormData(e.target));
            
            try {
                const response = await fetch('/token', {
                    method: 'POST',
                    body: formData, // URL encoded as required by OAuth2PasswordRequestForm
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    }
                });

                if (response.ok) {
                    window.location.href = '/';
                } else {
                    document.getElementById('error-msg').classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                document.getElementById('error-msg').classList.remove('hidden');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
